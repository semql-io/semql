[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "duckdb>=1.5.3",
    "griffe>=2.0.2",
    "hypothesis>=6.155.2",
    "mimesis>=19.1.0",
    "mutmut>=3.6.0",
    "mypy>=2.1.0",
    "pointblank>=0.24.0",
    "pre-commit>=4.6.0",
    "pyright>=1.1.410",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.16",
    "syrupy>=5.3.1",
    "tach>=0.35.0",
    "twine>=6.2.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ANN"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"packages/*/tests/*" = [
    "ANN401",  # duck-typed fakes stand in for real driver objects
]

[tool.mypy]
strict = true
python_version = "3.12"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
venvPath = "."
venv = ".venv"

[tool.pytest.ini_options]
addopts = "-q --cov=semql --cov-report=term-missing"
testpaths = ["packages"]

[tool.coverage.run]
source = ["semql"]
omit = ["*/tests/*", "*/conftest.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 0

[tool.mutmut]
source_paths = ["packages/semql/src/semql/"]
pytest_add_cli_args_test_selection = ["packages/semql/tests/"]
pytest_add_cli_args = ["-x", "-q", "--no-cov"]
