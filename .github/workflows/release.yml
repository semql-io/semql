name: Release

# Fires when a version tag is pushed (e.g. v0.6.0). Builds all eight
# packages, then publishes them to PyPI via OIDC Trusted Publishing —
# no API tokens stored in the repo. Each PyPI project must have a
# Trusted Publisher configured for this repo + workflow + the "pypi"
# environment (see docs/RELEASING.md).
on:
  push:
    tags: ["v*"]

# Read-only by default; each job widens scope only as far as it needs.
permissions:
  contents: read

env:
  UV_VERSION: "0.5.x"

jobs:
  build:
    name: build all packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          # No cache on the tag-triggered release build: a cache entry
          # poisoned by a lower-privilege ref must not reach a release.
          enable-cache: false

      - name: Build wheels + sdists
        run: |
          for pkg in semql semql-mcp semql-erd semql-validate-db \
                     semql-engine semql-introspect semql-auth semql-prompt; do
            echo "── build $pkg ──"
            uv build --package "$pkg"
          done

      - name: Validate metadata
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@v1.14.1

  github-release:
    name: create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release with autogenerated notes
        env:
          GH_TOKEN: ${{ github.token }}
          # Via env, not inline ${{…}}, so a crafted ref can't inject shell.
          TAG: ${{ github.ref_name }}
        run: >
          gh release create "$TAG"
          dist/*
          --title "$TAG"
          --generate-notes
