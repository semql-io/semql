name: Release

# Release flow:
#   * push a v* tag      -> build, create the GitHub Release (with the built
#                           artifacts), and publish to PyPI (if enabled).
#   * workflow_dispatch  -> build and create the GitHub Release only.
#
# PyPI publishing is gated on the repository variable ENABLE_PYPI_PUBLISH
# (set it to 'true' to enable). Trusted Publishing also needs a per-project
# publisher plus the "pypi" environment — see docs/RELEASING.md.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (created at the current commit if absent)"
        required: true
        type: string

# Read-only by default; each job widens scope only as far as it needs.
permissions:
  contents: read

env:
  UV_VERSION: "0.11.x" # must satisfy the uv_build backend (>=0.11.19)

jobs:
  build:
    name: build all packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          # No cache on the tag-triggered release build: a cache entry
          # poisoned by a lower-privilege ref must not reach a release.
          enable-cache: false

      - name: Build wheels + sdists
        run: |
          for pkg in semql semql-mcp semql-erd semql-validate-db \
                     semql-engine semql-introspect semql-auth semql-prompt; do
            echo "── build $pkg ──"
            uv build --package "$pkg"
          done

      - name: Validate metadata
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # PyPI publish: only on a tag push, and only when the repo variable
  # ENABLE_PYPI_PUBLISH is 'true'. The "pypi" environment carries the
  # trusted-publisher binding. Skipped entirely otherwise.
  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    if: github.event_name == 'push' && vars.ENABLE_PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@v1.14.1

  # GitHub Release with the built artifacts — on a tag push and on manual
  # dispatch. Independent of the PyPI gate.
  github-release:
    name: create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # create the release + upload assets
    env:
      # Tag from the ref on a tag push, or from the dispatch input. Via env,
      # not inline ${{…}} in run, so a crafted value can't inject shell.
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create release with autogenerated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$TAG"
          dist/*
          --title "$TAG"
          --generate-notes
