# Module-boundary enforcement for the core `semql` package.
#
# Two layers: `foundation` (data types + pure utilities) and `app`
# (resolution, compilation, orchestration, the public surface). tach lets a
# higher layer import a lower one, never the reverse — so an `app` module may
# import the value types, but a `foundation` module may NOT reach up into the
# compiler. This keeps the value types cheap to import and free of the
# machinery that operates on them. `tach check` fails on an upward import.
#
# Cross-*package* boundaries (core must not import sibling packages like
# semql-engine / semql-mcp) are enforced separately by
# scripts/check_core_boundary.py: tach treats the sibling distributions as
# external, so it cannot see those edges.

source_roots = ["packages/semql/src"]
root_module = "ignore"
layers = ["app", "foundation"]

exclude = [
    "**/tests/**",
    "**/__pycache__/**",
    ".venv/**",
]

# The `semql` package root (__init__ / __main__: the public surface).
[[modules]]
path = "semql"
layer = "app"

[[modules]]
path = "semql._grounding"
layer = "foundation"

[[modules]]
path = "semql._resolve"
layer = "app"

