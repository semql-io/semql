repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # GitHub Actions workflow linting + security audit.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.27.0
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy packages/
        language: system
        types: [python]
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: uv run pyright packages/
        language: system
        types: [python]
        pass_filenames: false
      - id: tach
        name: tach (module boundaries)
        entry: uv run tach check
        language: system
        types: [python]
        pass_filenames: false
      - id: core-boundary
        name: core imports no sibling packages
        entry: uv run python scripts/check_core_boundary.py
        language: system
        types: [python]
        pass_filenames: false
      - id: frozen-models
        name: pydantic models are frozen
        entry: uv run python scripts/check_frozen_models.py
        language: system
        types: [python]
        pass_filenames: false
