[project]
name = "semql-erd"
version = "0.6.0"
description = "Graphviz ER diagrams from a semql Catalog — cubes as nodes, joins as edges with crow's-foot arrowheads."
readme = "README.md"
license = "BSD-3-Clause"
license-files = ["LICENSE"]
authors = [
    { name = "Nikhil Pallamreddy", email = "nikhil.pallamreddy+git@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "semql>=0.6.0,<0.7",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Multimedia :: Graphics",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/semql-io/semql"
Repository = "https://github.com/semql-io/semql"
Issues = "https://github.com/semql-io/semql/issues"

[project.optional-dependencies]
# Required only for ``render_image`` (PNG/SVG output). ``render_dot``
# (the DOT-source path) has no third-party dependencies.
image = [
    "graphviz>=0.20",
]

[build-system]
requires = ["uv_build>=0.11.28,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
semql = { workspace = true, editable = true }
