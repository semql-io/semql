[project]
name = "semql"
version = "0.3.0"
description = "Semantic data layer: SemanticQuery → backend SQL with authorisation, row-level scoping, time-spine fill, and a typed four-role LLM prompt pipeline."
readme = "README.md"
license = "BSD-3-Clause"
license-files = ["LICENSE"]
authors = [
    { name = "Nikhil Pallamreddy", email = "nikhil.pallamreddy+git@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.13.4",
    "sqlglot>=30.9.0",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.optional-dependencies]
# S7 retrieval — vector-side retrievers (cosine, hybrid, MMR) need
# numpy for the per-cube embedding matrix and pairwise-similarity
# math. The lexical SQLiteBM25Retriever uses only stdlib sqlite3 +
# FTS5 and works without this extras group.
retrieval = ["numpy>=1.26"]

[project.urls]
Homepage = "https://github.com/npalladium/semql"
Repository = "https://github.com/npalladium/semql"
Issues = "https://github.com/npalladium/semql/issues"

[build-system]
requires = ["uv_build>=0.11.19,<0.12.0"]
build-backend = "uv_build"
