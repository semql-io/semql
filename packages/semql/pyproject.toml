[project]
name = "semql"
version = "0.7.0"
description = "Semantic data layer: SemanticQuery → backend SQL with authorisation, row-level scoping, time-spine fill, and a typed four-role LLM prompt pipeline."
readme = "README.md"
license = "BSD-3-Clause"
license-files = ["LICENSE"]
authors = [
    { name = "Nikhil Pallamreddy", email = "nikhil.pallamreddy+git@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.13.4",
    "sqlglot>=30.12.0",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.optional-dependencies]
# S7 retrieval — vector-side retrievers (cosine, hybrid, MMR) need
# numpy for the per-cube embedding matrix and pairwise-similarity
# math. The lexical SQLiteBM25Retriever uses only stdlib sqlite3 +
# FTS5 and works without this extras group.
retrieval = ["numpy>=1.26"]

[project.urls]
Homepage = "https://github.com/semql-io/semql"
Repository = "https://github.com/semql-io/semql"
Issues = "https://github.com/semql-io/semql/issues"

[build-system]
requires = ["uv_build>=0.11.19,<0.12.0"]
build-backend = "uv_build"

[tool.mutmut]
# Run from this directory: `cd packages/semql && uv run mutmut run`.
# mutmut copies the package into ./mutants and, per its
# ``setup_source_paths``, only makes ``mutants/.``|``src``|``source``
# importable while deleting ``.``|``src``|``source`` from sys.path — so
# it must run from the package root with a ``src/`` layout. ``src``
# resolves equal to the editable-install .pth path, so the real package
# is removed and the mutated copy under ./mutants/src wins on import.
source_paths = ["src/semql/"]
# Tests live beside src; mutmut chdir's into ./mutants before pytest, so
# the selection is ../tests relative to that.
pytest_add_cli_args_test_selection = ["../tests/"]
# Clear the repo's coverage addopts (--cov breaks mutmut's in-process
# pytest); -x stops at the first surviving/failing case per mutant.
pytest_add_cli_args = ["-o", "addopts=", "-x", "-q", "-p", "no:cacheprovider"]
