[project]
name = "semql-auth"
version = "0.6.0"
description = "Credentialâ†’identity adapters for semql: bearer-token verifiers (HMAC, JWKS, introspection) and mappers (dict, mTLS x509) that produce a semql AuthContext."
readme = "README.md"
license = "BSD-3-Clause"
license-files = ["LICENSE"]
authors = [
    { name = "Nikhil Pallamreddy", email = "nikhil.pallamreddy+git@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "semql>=0.6.0,<0.7",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.optional-dependencies]
# JWKSVerifier needs PyJWT (with crypto extras for RS/ES verification)
# plus httpx to fetch the JWKS document; both are imported lazily so the
# rest of the package works without them.
jwks = ["pyjwt[crypto]>=2.13.0", "httpx>=0.27"]
# IntrospectMapper posts to an OAuth2 token-introspection endpoint.
introspect = ["httpx>=0.27"]
# X509Mapper's reference cert decoder (semql_auth.auth._cryptography_adapter).
x509 = ["cryptography>=42"]

[project.urls]
Homepage = "https://github.com/semql-io/semql"
Repository = "https://github.com/semql-io/semql"
Issues = "https://github.com/semql-io/semql/issues"

[build-system]
requires = ["uv_build>=0.11.28,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
semql = { workspace = true, editable = true }
